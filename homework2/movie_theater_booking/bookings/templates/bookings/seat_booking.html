{% extends 'bookings/base.html' %}

{% block title %}Book Seat{% endblock %}

{% block content %}

<h2>Book a Seat</h2>

<form method="post">
{% csrf_token %}

<select name="seat" class="form-control">

{% for seat in seats %}
<option value="{{ seat.id }}">
Seat {{ seat.seat_number }}
</option>
{% endfor %}

</select>

<button type="submit" class="btn btn-success mt-2">
Book Seat
</button>

</form>

{% endblock %}
